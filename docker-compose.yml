services:
  rabbitmq:
    image: rabbitmq:management
    ports:
      - "15672:15672"  # RabbitMQ Management Console
      - "5672:5672"    # RabbitMQ Client
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password

  db:
    image: mcr.microsoft.com/mssql/server
    environment:
      SA_PASSWORD: ""
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
      MSSQL_DATA_DIR: "/var/opt/mssql/customdata"
    volumes: 
      - "/var/opt/mssql/customdata"
    ports:
      - "1433:1433"

  userservice:
    build:
      context: ./UserService
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__UserServiceDatabase: ""
    depends_on:
      - rabbitmq
      - db
    ports:
      - "5000:5000"   
      
  authservice:
    build:
      context: ./AuthService
      dockerfile: Dockerfile
    depends_on:
      - rabbitmq
      - db
    ports:
      - "5002:5002"   